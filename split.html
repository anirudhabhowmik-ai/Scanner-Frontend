    <style>
      /* ================= CUSTOM RADIO BUTTON ================= */

      .radio-group {
        display: flex;
        gap: 20px;
        margin-top: 10px;
        flex-wrap: wrap;
      }

      .custom-radio {
        display: flex;
        align-items: center;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        color: #1e3a8a;
        user-select: none;
        position: relative;
      }

      /* Hide default radio */
      .custom-radio input[type="radio"] {
        display: none;
      }

      /* Radio outer circle */
      .radio-mark {
        width: 18px;
        height: 18px;
        border: 2px solid #1e3a8a;
        border-radius: 50%;
        margin-right: 8px;
        position: relative;
        transition: all 0.25s ease;
      }

      /* Inner dot */
      .radio-mark::after {
        content: "";
        width: 10px;
        height: 10px;
        background: #fbbf24;
        border-radius: 50%;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0);
        transition: transform 0.25s ease;
      }

      /* Checked state */
      .custom-radio input:checked + .radio-mark {
        border-color: #fbbf24;
      }

      .custom-radio input:checked + .radio-mark::after {
        transform: translate(-50%, -50%) scale(1);
      }

      /* Hover effect */
      .custom-radio:hover .radio-mark {
        border-color: #f59e0b;
      }

      /* Mobile spacing */
      @media (max-width: 480px) {
        .radio-group {
          gap: 12px;
        }
      }
    </style>

  <body>
    <section id="header-placeholder"></section>

    <!-- ================= SPLIT TOOL ================= -->
    <section class="merge-tool">
      <div class="container">
        <h1>NextoPDF - Split PDF File Online Free</h1>
        <p>
          NextoPDF - Split a PDF into individual pages or extract specific page
          ranges. Fast, secure, and completely free.
        </p>

        <div class="upload-section">
          <!-- Upload Section -->
          <div id="uploadSection">
            <label for="pdfUpload" class="upload-label">
              <i class="fa fa-upload"></i> Choose PDF file
            </label>
            <input type="file" id="pdfUpload" accept=".pdf" />
          </div>

          <!-- File List -->
          <ul id="fileList" class="file-list" style="display: none"></ul>

          <!-- Split Options -->
          <div id="splitOptions" class="radio-group">
            <label class="custom-radio">
              <input type="radio" name="splitType" value="all" checked />
              <span class="radio-mark"></span>
              Extract All Pages
            </label>

            <label class="custom-radio">
              <input type="radio" name="splitType" value="range" />
              <span class="radio-mark"></span>
              Page Range
            </label>
          </div>

          <!-- Page range -->
          <input
            type="text"
            id="pageRange"
            class="page-range"
            placeholder="e.g., 1-3,5,7-9"
            style="display: none"
          />

          <!-- Split button -->
          <button id="splitBtn" class="cta-button" style="margin-top: 15px">
            <i class="fa fa-spinner fa-spin" style="display: none"></i>
            <span id="splitIcon"
              ><i
                class="fa fa-cut"
                aria-hidden="true"
                style="margin-right: 8px"
              ></i
            ></span>
            Split PDF
          </button>

          <!-- Error -->
          <p id="errorMsg" class="error-text"></p>

          <!-- Note -->
          <p id="noteText" class="note">
            Supported format: PDF. Files larger than 20MB are processed on the
            server.
          </p>

          <!-- Result Section -->
          <div id="resultBtns" style="display: none; margin-top: 15px">
            <div id="resultCard" class="result-card">
              <i class="fa fa-file-archive"></i>
            </div>
            <p class="file-name">split-pages.zip</p>

            <a id="downloadBtn" href="#" class="cta-button">
              <i class="fa fa-download"></i> Download Split Pages
            </a>
            <button id="resetBtn" class="secondary-btn">
              <i class="fa fa-rotate-right"></i> Split Another PDF
            </button>
          </div>
        </div>
      </div>
    </section>

    <section id="footer-placeholder"></section>

    <!-- ================= LIBRARIES ================= -->
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <!-- Main JS (for hamburger menu) -->
    <script src="./js/app.js"></script>

    <!-- ================= SCRIPT ================= -->
    <script>
      /* ================= CONFIG ================= */
      const BACKEND_SPLIT_URL = `${BACKEND_BASE_URL}/split-pdf`;
      const MAX_FRONTEND_SIZE = 20 * 1024 * 1024; // 20MB

      /* ================= ELEMENTS ================= */
      const pdfInput = document.getElementById("pdfUpload");
      const fileList = document.getElementById("fileList");
      const splitBtn = document.getElementById("splitBtn");
      const loader = splitBtn.querySelector(".fa-spinner");
      const splitIcon = document.getElementById("splitIcon");
      const resultSection = document.getElementById("resultBtns");
      const downloadBtn = document.getElementById("downloadBtn");
      const resetBtn = document.getElementById("resetBtn");
      const noteText = document.getElementById("noteText");
      const errorMsg = document.getElementById("errorMsg");
      const pageRangeInput = document.getElementById("pageRange");
      const splitOptions = document.getElementById("splitOptions");
      splitOptions.style.display = "none";
      const splitTypeRadios = document.getElementsByName("splitType");
      const uploadSection = document.getElementById("uploadSection");

      let selectedFile = null;

      /* ================= FILE SELECT ================= */
      pdfInput.addEventListener("change", () => {
        selectedFile = pdfInput.files[0];
        errorMsg.style.display = "none";

        if (selectedFile) {
          splitOptions.style.display = "flex";
          renderFileList();
        }

        // Reset input
        pdfInput.value = "";
      });

      /* ================= RENDER FILE LIST ================= */
      function renderFileList() {
        fileList.style.display = "block";
        fileList.innerHTML = "";

        const li = document.createElement("li");
        li.innerHTML = `<i class="fa fa-file-pdf pdf-icon"></i> <span>${selectedFile.name}</span> <i class="fa fa-times delete-file"></i>`;
        fileList.appendChild(li);
      }

      /* ================= DELETE FILE ================= */
      fileList.addEventListener("click", (e) => {
        if (e.target.classList.contains("delete-file")) {
          selectedFile = null;
          fileList.style.display = "none";
          splitOptions.style.display = "none";
          fileList.innerHTML = "";
          pageRangeInput.style.display = "none";
          errorMsg.style.display = "none";
          document.querySelector(
            'input[name="splitType"][value="all"]',
          ).checked = true;
        }
      });

      /* ================= SPLIT TYPE TOGGLE ================= */
      splitTypeRadios.forEach((option) => {
        option.addEventListener("change", () => {
          if (option.value === "range" && option.checked) {
            pageRangeInput.style.display = "block";
          } else if (option.value === "all" && option.checked) {
            pageRangeInput.style.display = "none";
          }
        });
      });

      /* ================= SPLIT CLICK ================= */
      splitBtn.addEventListener("click", async () => {
        if (!selectedFile) {
          errorMsg.textContent = "Please select a PDF file.";
          errorMsg.style.display = "block";
          return;
        }

        errorMsg.style.display = "none";

        try {
          let blob;
          const splitType = document.querySelector(
            'input[name="splitType"]:checked',
          ).value;
          const range =
            splitType === "range" ? pageRangeInput.value.trim() : "";

          if (splitType === "range" && range === "") {
            showError("Please enter a valid page range (e.g. 1-3,5,7-9).");
            return;
          }

          loader.style.display = "inline-block";
          splitIcon.style.display = "none";
          splitBtn.disabled = true;

          clearError();

          if (selectedFile.size <= MAX_FRONTEND_SIZE) {
            blob = await splitFrontend(selectedFile, range);
          } else {
            blob = await splitBackend(selectedFile, range);
          }

          const url = URL.createObjectURL(blob);

          // Hide UI elements
          fileList.style.display = "none";
          uploadSection.style.display = "none";
          splitOptions.style.display = "none";
          pageRangeInput.style.display = "none";
          noteText.style.display = "none";
          splitBtn.style.display = "none";
          loader.style.display = "none";
          splitIcon.style.display = "inline-block";

          // Show result
          resultSection.style.display = "block";
          downloadBtn.href = url;
          downloadBtn.download = "split-pages.zip";
        } catch (err) {
          errorMsg.textContent = "Error splitting PDF: " + err.message;
          errorMsg.style.display = "block";
          splitBtn.disabled = false;
          loader.style.display = "none";
          splitIcon.style.display = "inline-block";
        }
      });

      pageRangeInput.addEventListener("input", () => {
        if (pageRangeInput.value.trim() !== "") {
          clearError();
        }
      });

      function showError(message) {
        errorMsg.textContent = message;
        errorMsg.style.display = "block";
      }

      function clearError() {
        errorMsg.textContent = "";
        errorMsg.style.display = "none";
      }

      /* ================= FRONTEND SPLIT ================= */
      async function splitFrontend(file, range) {
        const zip = new JSZip();
        const pdfBytes = await file.arrayBuffer();
        const pdfDoc = await PDFLib.PDFDocument.load(pdfBytes);
        const totalPages = pdfDoc.getPageCount();

        const pages = parseRange(range, totalPages);

        for (const i of pages) {
          const newPdf = await PDFLib.PDFDocument.create();
          const [page] = await newPdf.copyPages(pdfDoc, [i]);
          newPdf.addPage(page);

          const bytes = await newPdf.save();
          zip.file(`page-${i + 1}.pdf`, bytes);
        }

        return await zip.generateAsync({ type: "blob" });
      }

      /* ================= BACKEND SPLIT ================= */
      async function splitBackend(file, range) {
        const formData = new FormData();
        formData.append("file", file);
        formData.append("range", range);

        const response = await fetch(BACKEND_SPLIT_URL, {
          method: "POST",
          body: formData,
        });

        if (!response.ok) throw new Error("Backend error");

        return await response.blob();
      }

      /* ================= RANGE PARSER ================= */
      function parseRange(range, total) {
        if (!range) return [...Array(total).keys()];

        const pages = new Set();
        range.split(",").forEach((part) => {
          if (part.includes("-")) {
            let [s, e] = part.split("-").map((n) => parseInt(n) - 1);
            for (let i = s; i <= e; i++) {
              if (i >= 0 && i < total) pages.add(i);
            }
          } else {
            const p = parseInt(part) - 1;
            if (p >= 0 && p < total) pages.add(p);
          }
        });

        return [...pages].sort((a, b) => a - b);
      }

      /* ================= RESET ================= */
      resetBtn.addEventListener("click", () => {
        // Reset file
        pdfInput.value = "";
        pageRangeInput.value = "";
        selectedFile = null;

        // Reset UI
        fileList.innerHTML = "";
        fileList.style.display = "none";
        uploadSection.style.display = "block";
        resultSection.style.display = "none";
        noteText.style.display = "block";
        splitBtn.style.display = "inline-flex";
        splitBtn.disabled = false;
        loader.style.display = "none";
        splitIcon.style.display = "inline-block";
        errorMsg.style.display = "none";
        splitOptions.style.display = "none";
        pageRangeInput.style.display = "none";

        // Reset radio
        document.querySelector('input[name="splitType"][value="all"]').checked =
          true;

        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    </script>
